<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information</title>
</head>
<body>
    <h1>Student Basic Information</h1>
    <p>This page shows the basic details for a sample student.</p>

    <section>
        <h2>Student Profile</h2>
        <table border="1" cellpadding="8" cellspacing="0">
            <tr>
                <th>Field</th>
                <th>Information</th>
            </tr>
            <tr>
                <td>Name</td>
                <td>Maria Johnson</td>
            </tr>
            <tr>
                <td>Age</td>
                <td>16</td>
            </tr>
            <tr>
                <td>Grade</td>
                <td>11</td>
            </tr>
            <tr>
                <td>Student ID</td>
                <td>STU12345</td>
            </tr>
            <tr>
                <td>School</td>
                <td>Sunrise High School</td>
            </tr>
            <tr>
                <td>Favorite Subject</td>
                <td>Biology</td>
            </tr>
        </table>
    </section>
</body>
</html>
